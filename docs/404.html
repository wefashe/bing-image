<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>页面未找到 - 必应壁纸</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/vnd.microsoft.icon" href="static/img/favicon-3.ico" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #333;
        }
        .container { text-align: center; padding: 48px 24px; }
        .container img { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .container h1 { font-size: 20px; font-weight: 600; letter-spacing: 2px; margin-bottom: 8px; }
        .container .divider { width: 32px; height: 3px; border-radius: 2px; background: #0e90d2; margin: 16px auto; }
        .container p { font-size: 14px; line-height: 2; opacity: .55; }
        .container a { display: inline-block; margin-top: 24px; font-size: 14px; color: #0e90d2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="static/img/favicon-3.ico" alt="必应壁纸" />
        <h1>页面未找到</h1>
        <div class="divider"></div>
        <p>您访问的页面不存在或已被移除</p>
        <a href="/">返回首页</a>
    </div>
</body>
</html>
